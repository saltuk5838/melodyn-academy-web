<!DOCTYPE html>
<html lang="tr-tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melodyn Akademi | Kurs Keşif Anketi</title>
    <link href="bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="logo .jpeg" alt="Logo">Melodyn Akademi
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu" aria-controls="navbarMenu" aria-expanded="false" aria-label="Menüyü aç">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Ana Sayfa</a></li>
                    <li class="nav-item"><a class="nav-link active" href="anket.html">Anket</a></li>
                    <li class="nav-item"><a class="nav-link" href="kurslar.html">Kurslar</a></li>
                    <li class="nav-item"><a class="nav-link" href="hakkimizda.html">Hakkımızda</a></li>
                    
                    <!-- SEPET BUTONU VE LİSTESİ -->
                    <li class="nav-item position-relative">
                        <button class="btn btn-outline-light ms-3" id="cart-btn" onclick="sepetiAcKapat()">
                            Sepetim (0)
                        </button>
                        
                        <!-- Sepet Penceresi (JS ile kontrol ediliyor) -->
                        <div id="sepet-penceresi" style="display:none; position:absolute; right:0; top:55px; width:280px; background:#1a1a1a; border:1px solid #ffb400; border-radius:12px; padding:15px; z-index:9999; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                            <h5 style="color:#ffb400; font-size: 1.1rem; border-bottom: 1px solid #333; pb-2;">Sepetiniz</h5>
                            <ul id="sepet-listesi" style="list-style:none; padding:10px 0; max-height:250px; overflow-y:auto; margin:0;">
                                <!-- JS ile dolacak -->
                            </ul>
                            <div style="border-top: 1px solid #333; pt-2; margin-top:10px;">
                                <button class="btn btn-warning w-100 fw-bold" onclick="sepetiOnayla()">Sepeti Onayla</button>
                            </div>
                        </div>
                    </li>

                    <li class="nav-item ms-3">
                        <button class="btn btn-warning" onclick="loginAlert()">Giriş Yap</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="survey-section">
        <div class="container">
            <div id="survey-card" class="survey-card">

                <!-- Giriş Ekranı -->
                <div id="intro-container">
                    <div class="intro-icon">🎵</div>
                    <h2 class="intro-title">Müzikal Yolculuğuna Başla</h2>
                    <p class="intro-desc">Sana en uygun enstrümanı ve seviyeyi bulmak için kısa bir analiz yapacağız.</p>
                    <div class="intro-meta">
                        <span>📋 7 Soru</span>
                        <span>⏱ ~2 Dakika</span>
                        <span>🎯 Kişisel Öneri</span>
                    </div>
                    <button onclick="startSurvey()" class="btn-start">Ankete Başla</button>
                </div>

                <!-- Anket Ekranı -->
                <div id="survey-main" style="display: none;">
                    <div class="progress-container mb-2">
                        <div class="progress-bar" id="survey-progress"></div>
                    </div>
                    <p id="step-counter" class="step-counter">Soru 1 / 7</p>

                    <div id="question-container">
                        <h2 id="question-text"></h2>
                        <div id="options" class="options-grid"></div>
                    </div>

                    <div class="survey-nav mt-4">
                        <button id="back-btn" onclick="goBack()" class="btn-back" style="display: none;">← Geri</button>
                    </div>
                </div>

                <!-- Sonuç Ekranı -->
                <div id="result-container" class="result-container" style="display: none;">
                    <h2 class="result-title">Müzikal Kimliğin Belirlendi!</h2>
                    <div id="course-result" class="course-card-result"></div>
                    <div class="result-actions mt-4">
                        <a href="#" id="buy-course-btn" class="btn btn-warning btn-lg px-5 py-3">Kursu Satın Al</a>
                        <button onclick="location.reload()" class="btn btn-outline-light ms-2">Yeniden Çöz</button>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <!-- JS BAĞLANTILARI -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
